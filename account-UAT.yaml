spring:
    application:
        name: ACCOUNT_SERVICE
    datasource:
        url: jdbc:mysql://localhost:3306/account_db
        username: root
        password: root123
        driver-class-name: com.mysql.cj.jdbc.Driver

server:
    port: 8282

logging:
    file:
        name: logs/account.log

management:
    endpoints:
        web:
            base-path: /actuator
            exposure:
                include: health,info,metrics,env,beans,mappings,totalsavings-metrics

    endpoint:
        health:
            show-details: always
            show-components: always

    health:
        defaults:
            enabled: true

    info:
        env:
            enabled: true

